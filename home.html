<!DOCTYPE html>
<html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Flappy Bird Pro - Level System</title> <link href="https://www.google.com/search?q=https://fonts.googleapis.com/css2%3Ffamily%3DPress%2BStart%2B2P%26display%3Dswap" rel="stylesheet"> <style> /* Base Styling and Mobile-First Layout / body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #1a1a2e; / Dark space background */ font-family: 'Press Start 2P', cursive; color: #fff; padding: 10px; box-sizing: border-box; user-select: none; }
    #game-container {
        position: relative;
        background: #2a2a4a;
        border: 8px solid #3d3d62;
        box-shadow: 0 10px 0 #1a1a2e;
        border-radius: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px;
        width: 95%; /* Responsive width */
        max-width: 420px; /* Maximize for standard phone width */
    }

    canvas {
        display: block;
        width: 100%;
        height: 80vw; /* Height relative to viewport width */
        max-height: 550px; /* Cap the height on larger screens */
        background: linear-gradient(to bottom, #7be0ff 0%, #2099ff 100%); /* Sky background */
        border-radius: 8px;
        margin-bottom: 10px;
        box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
        touch-action: none; 
    }

    /* Score and Level Display */
    #score-display {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 18px;
        color: #fff;
        text-shadow: 2px 2px #000;
        z-index: 10;
        pointer-events: none;
        text-align: center;
        line-height: 1.2;
        padding: 5px 10px;
        background-color: rgba(0, 0, 0, 0.3);
        border-radius: 5px;
    }
    
    #score-display span {
        display: block;
    }

    /* Message Box (Game Over/Start Screen) */
    #message-box {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 20px 30px;
        background-color: rgba(0, 0, 0, 0.95);
        border: 4px solid #ffcc00;
        border-radius: 10px;
        text-align: center;
        z-index: 20;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        max-width: 80%;

        animation: pulse 1.5s infinite alternate;
    }

    #message-box h2 {
        margin-top: 0;
        font-size: 18px;
        color: #ffcc00;
    }

    #message-box p {
        font-size: 10px;
        margin-bottom: 5px;
        line-height: 1.2;
    }
    
    /* New styling for the Exit Button inside the message box */
    #message-box button {
        font-family: 'Press Start 2P', cursive;
        padding: 10px 15px;
        margin: 15px auto 5px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-shadow: 1px 1px #000;
        font-size: 10px;
        transition: background-color 0.2s, transform 0.1s;
        background-color: #ff6f61;
        color: #fff;
        box-shadow: 0 4px 0 #cc5950;
        line-height: 1;
        display: block; /* Makes the button take up its own row */
    }
    #message-box button:active {
        box-shadow: 0 1px 0 #cc5950;
        transform: translateY(3px);
    }
    .restart-prompt {
        color: #ccc;
        margin-top: 10px !important;
    }

    /* Controls UI Styling */
    #game-controls {
        display: flex;
        justify-content: center;
        width: 100%;
        max-width: 400px;
        margin-top: 10px;
        padding: 10px 0;
    }

    #game-controls button {
        font-family: 'Press Start 2P', cursive;
        padding: 10px 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-shadow: 1px 1px #000;
        font-size: 10px;
        transition: background-color 0.2s, transform 0.1s;
        background-color: #ff6f61;
        color: #fff;
        box-shadow: 0 4px 0 #cc5950;
        line-height: 1;
    }

    #game-controls button:hover {
        background-color: #ff887a;
    }

    #game-controls button:active {
        box-shadow: 0 1px 0 #cc5950;
        transform: translateY(3px);
    }

    #slowMoButton.active {
        background-color: #4CAF50; /* Green when active (Normal Speed) */
        box-shadow: 0 4px 0 #3c8d3e;
    }

    #slowMoButton.active:active {
        box-shadow: 0 1px 0 #3c8d3e;
        transform: translateY(3px);
    }

    @keyframes pulse {
        from { opacity: 1; }
        to { opacity: 0.7; }
    }

    /* Responsive adjustments for font size on smaller screens */
    @media (max-width: 450px) {
        #score-display {
            font-size: 14px;
        }
        #message-box h2 {
            font-size: 14px;
        }
        #message-box p {
            font-size: 8px;
        }
        #game-controls button, #message-box button {
            font-size: 8px;

        }
    }
</style>


</head> <body>
<div id="game-container"> <div id="score-display"> <span id="scoreText">Score: 0</span> <span id="levelText">Level: 1</span> </div> <!-- Internal drawing resolution is 300x500 for consistent graphics --> <canvas id="flappyCanvas" width="300" height="500"></canvas> <div id="message-box"> <h2>FLAPPY BIRD</h2> <p>Tap or Click to Start & Flap!</p> </div>
<!-- Game Controls UI -->
<div id="game-controls">
    <button id="slowMoButton">Slow Motion</button>
</div>


</div>
<script> // --- Configuration Constants --- const CANVAS_ID = "flappyCanvas"; const MESSAGE_ID = "message-box"; const SLOW_MO_BUTTON_ID = "slowMoButton"; const FPS = 60; const GROUND_HEIGHT = 50;
// --- Level Configuration ---
const levelConfig = [
    // Level 1: Beginner
    { level: 1, baseSpeed: 3, gap: 120, scoreThreshold: 10 },
    // Level 2: Easy
    { level: 2, baseSpeed: 4, gap: 110, scoreThreshold: 20 },
    // Level 3: Medium
    { level: 3, baseSpeed: 5, gap: 100, scoreThreshold: 30 },
    // Level 4: Hard
    { level: 4, baseSpeed: 6, gap: 90, scoreThreshold: 40 },
    // Level 5: Expert (Max difficulty)
    { level: 5, baseSpeed: 7, gap: 80, scoreThreshold: Infinity } 
];

// --- Game State Variables ---
let canvas, ctx;
let gameLoopInterval;
let score = 0;
let currentLevelIndex = 0; 
let isPlaying = false;
let isSlowMo = false; 
let frameCount = 0;

// UI Element References
let messageBox, slowMoButton, scoreText, levelText;

// Bird Properties
const bird = {
    x: 50,
    y: 250,
    size: 15, 
    velocity: 0,
    gravity: 0.5,
    jumpPower: -8,
    color: '#ffdd00',
    rotation: 0,
};

// Pipe Properties - Initial default values, updated by updateLevelParameters
const pipeConfig = {
    width: 60,
    gap: 120, 
    speed: 3, 
    color: '#74c76b',
    border: '#467c42',
    spawnRate: 100, 
    minGapY: 100,
    maxGapY: 400
};
let pipes = [];

// Ground Properties
const ground = {
    color: '#d2b48c',
    height: GROUND_HEIGHT,
    offset: 0,
    patternColor: '#9c8167' 
};

// --- Utility & Setup Functions ---

/**
 * Updates pipeConfig (speed and gap) based on the current level.
 */
function updateLevelParameters() {
    const levelData = levelConfig[currentLevelIndex];

    pipeConfig.gap = levelData.gap;

    const baseSpeed = levelData.baseSpeed;
    pipeConfig.speed = isSlowMo ? baseSpeed / 2 : baseSpeed;
}

/**
 * Toggles the slow motion state and recalculates pipe speed.
 */
function toggleSlowMotion() {
    isSlowMo = !isSlowMo;
    updateLevelParameters(); 
    updateSlowMoButton();
}

/**
 * Updates the slow motion button text/style.
 */
function updateSlowMoButton() {
    if (slowMoButton) {
        slowMoButton.textContent = isSlowMo ? 'Normal Speed' : 'Slow Motion';
        slowMoButton.classList.toggle('active', !isSlowMo); 
    }
}


/**
 * Initializes the canvas and UI references.
 */
function initGame() {
    canvas = document.getElementById(CANVAS_ID);
    ctx = canvas.getContext("2d");
    messageBox = document.getElementById(MESSAGE_ID);
    slowMoButton = document.getElementById(SLOW_MO_BUTTON_ID);
    scoreText = document.getElementById('scoreText');
    levelText = document.getElementById('levelText');

    // Event listeners
    slowMoButton.addEventListener('click', toggleSlowMotion);
    canvas.addEventListener('click', handleInput);
    canvas.addEventListener('touchstart', handleInput, { passive: false });
    
    updateSlowMoButton(); 
    draw();
}

/**
 * Handles user click/tap input to start the game or flap.
 */
function handleInput(e) {
    e.preventDefault(); 
    if (!isPlaying) {
        startGame();
    } else {
        flap();
    }
}

/**
 * Resets game state and starts the game loop.
 */
function startGame() {
    if (gameLoopInterval) clearInterval(gameLoopInterval);

    score = 0;
    pipes = [];
    bird.y = canvas.height / 2;
    bird.velocity = 0;
    bird.rotation = 0;
    isPlaying = true;
    messageBox.style.display = 'none';

    currentLevelIndex = 0;
    isSlowMo = false;
    updateLevelParameters(); 
    updateScoreDisplay();
    updateSlowMoButton();

    gameLoopInterval = setInterval(gameLoop, 1000 / FPS);
}

/**
 * Resets the game state and returns to the initial start screen.
 */
function exitToStartScreen() {
    if (gameLoopInterval) clearInterval(gameLoopInterval);
    isPlaying = false;
    
    // Restore initial message
    messageBox.innerHTML = `<h2>FLAPPY BIRD</h2><p>Tap or Click to Start & Flap!</p>`;
    messageBox.style.display = 'block';
    scoreText.textContent = `Score: 0`;
    levelText.textContent = `Level: 1`;
    
    // Reset core game variables
    currentLevelIndex = 0;
    isSlowMo = false;
    pipes = [];
    bird.y = canvas.height / 2;
    bird.velocity = 0;
    updateLevelParameters();
    updateSlowMoButton();

    // Redraw initial state
    draw();
}

/**
 * Stops the game loop, shows the game over message, and displays the exit button.
 */
function endGame() {
    isPlaying = false;
    clearInterval(gameLoopInterval);
    
    // New HTML content for game over state, including the Exit button
    messageBox.innerHTML = `
        <h2>GAME OVER!</h2>
        <p>Final Score: ${score}<br>Max Level: ${currentLevelIndex + 1}</p>
        <button id="exitButton">Exit to Main Menu</button>
        <p class="restart-prompt">Tap or Click anywhere else to Restart.</p>
    `;
    messageBox.style.display = 'block';

    // Attach listener to the new button element
    // Use setTimeout to ensure the button is rendered in the DOM before we query it
    setTimeout(() => {
        const exitBtn = document.getElementById('exitButton');
        if (exitBtn) {
            exitBtn.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevents the click from activating the general restart logic
                exitToStartScreen();
            });
        }
    }, 0);
}

/**
 * Applies an upward force to the bird.
 */
function flap() {
    const jumpFactor = isSlowMo ? 0.75 : 1;
    bird.velocity = bird.jumpPower * jumpFactor;
}

/**
 * Updates the score and level displayed on the screen.
 */
function updateScoreDisplay() {
    scoreText.textContent = `Score: ${score}`;
    levelText.textContent = `Level: ${currentLevelIndex + 1}`;
}

// --- Drawing Functions (Graphics) ---

/**
 * Draws the bird on the canvas with rotation and custom shape.
 */
function drawBird() {
    const size = bird.size;
    const maxVel = 10;
    const maxRotation = Math.PI / 2;
    bird.rotation = Math.min(maxRotation, Math.max(-maxRotation, bird.velocity / maxVel * maxRotation));

    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rotation);

    // Body
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.ellipse(0, 0, size * 1.2, size, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#9c5c00';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Beak
    ctx.fillStyle = '#ff9900';
    ctx.beginPath();
    ctx.moveTo(size * 1.2, 0);
    ctx.lineTo(size * 1.8, -size / 4);
    ctx.lineTo(size * 1.8, size / 4);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Wing
    ctx.fillStyle = '#ff6f61';
    ctx.fillRect(-size * 0.5, size * 0.2, size, size * 0.5);
    ctx.strokeRect(-size * 0.5, size * 0.2, size, size * 0.5);

    // Eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(size * 0.5, -size * 0.4, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
}

/**
 * Draws a single pipe with flanges.
 */
function drawPipe(pipe) {
    const pW = pipeConfig.width;
    const pBW = 5; 
    const flangeH = 15; 
    const flangeW = pW + 10; 

    // --- Top Pipe ---
    ctx.fillStyle = pipeConfig.color;
    ctx.fillRect(pipe.x, 0, pW, pipe.y);
    ctx.fillRect(pipe.x - 5, pipe.y - flangeH, flangeW, flangeH); // Flange
    ctx.strokeStyle = pipeConfig.border;
    ctx.lineWidth = pBW;
    ctx.strokeRect(pipe.x - 5, pipe.y - flangeH, flangeW, flangeH);
    ctx.strokeRect(pipe.x, 0, pW, pipe.y - flangeH);
    
    // --- Bottom Pipe ---
    const bottomY = pipe.y + pipeConfig.gap;
    const bottomH = canvas.height - bottomY - ground.height;
    ctx.fillStyle = pipeConfig.color;
    ctx.fillRect(pipe.x, bottomY, pW, bottomH);
    ctx.fillRect(pipe.x - 5, bottomY, flangeW, flangeH); // Flange
    ctx.strokeStyle = pipeConfig.border;
    ctx.lineWidth = pBW;
    ctx.strokeRect(pipe.x - 5, bottomY, flangeW, flangeH);
    ctx.strokeRect(pipe.x, bottomY + flangeH, pW, bottomH - flangeH);
}

/**
 * Draws the scrolling ground.
 */
function drawGround() {
    const totalHeight = canvas.height;
    const groundY = totalHeight - ground.height;
    
    ctx.fillStyle = ground.color;
    ctx.fillRect(0, groundY, canvas.width, ground.height);

    ctx.strokeStyle = '#4CAF50';
    ctx.lineWidth = 10;
    ctx.beginPath();
    ctx.moveTo(0, groundY + 5);
    ctx.lineTo(canvas.width, groundY + 5);
    ctx.stroke();

    ctx.fillStyle = ground.patternColor;
    const patternSize = 30;
    for (let x = -patternSize + (ground.offset % patternSize); x < canvas.width; x += patternSize) {
        ctx.fillRect(x, groundY + 15, patternSize * 0.5, 20);
    }

    ctx.strokeStyle = '#2e7d32';
    ctx.lineWidth = 5;
    ctx.strokeRect(0, groundY, canvas.width, ground.height);
}

/**
 * Clears the canvas and draws all game elements.
 */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pipes.forEach(drawPipe);
    drawGround();
    drawBird();
}

// --- Game Logic Functions ---

/**
 * Updates the bird's position, velocity, and rotation.
 */
function updateBird() {
    const speedFactor = isSlowMo ? 0.5 : 1;

    bird.velocity += bird.gravity * speedFactor;
    bird.y += bird.velocity * speedFactor;

    const maxFallSpeed = 10;
    if (bird.velocity > maxFallSpeed) bird.velocity = maxFallSpeed;
}

/**
 * Updates ground position for scrolling.
 */
function updateGround() {
    const moveSpeed = pipeConfig.speed;
    ground.offset += moveSpeed;
    if (ground.offset >= canvas.width) {
        ground.offset %= canvas.width;
    }
}

/**
 * Generates a new pipe with a random gap position.
 */
function generatePipe() {
    const minGapY = pipeConfig.minGapY;
    const maxGapY = canvas.height - ground.height - pipeConfig.minGapY - pipeConfig.gap;

    if (maxGapY > minGapY) {
        const gapY = Math.random() * (maxGapY - minGapY) + minGapY;
        pipes.push({
            x: canvas.width,
            y: gapY, 
            scored: false
        });
    }
}

/**
 * Updates pipe positions and cleans up off-screen pipes.
 */
function updatePipes() {
    pipes.forEach(pipe => {
        pipe.x -= pipeConfig.speed;
    });

    if (frameCount % pipeConfig.spawnRate === 0) {
        generatePipe();
    }

    pipes = pipes.filter(pipe => pipe.x + pipeConfig.width > 0);
}

/**
 * Checks if the bird passed a pipe and updates the score/level.
 */
function checkScore() {
    const currentLevelData = levelConfig[currentLevelIndex];

    for (const pipe of pipes) {
        if (!pipe.scored && pipe.x + pipeConfig.width < bird.x) {
            score++;
            pipe.scored = true;
            updateScoreDisplay();

            if (currentLevelIndex < levelConfig.length - 1 && score >= currentLevelData.scoreThreshold) {
                currentLevelIndex++;
                updateLevelParameters();
                updateScoreDisplay();
                console.log(`Level Up! Now on Level ${currentLevelIndex + 1}`);
            }
        }
    }
}

/**
 * Checks for collisions between the bird and pipes/boundaries.
 * @returns {boolean} True if collision occurred.
 */
function checkCollision() {
    if (bird.y + bird.size > canvas.height - ground.height || bird.y - bird.size < 0) {
        return true;
    }

    const birdRadius = bird.size * 0.9; 
    for (const pipe of pipes) {
        if (bird.x + birdRadius > pipe.x && bird.x - birdRadius < pipe.x + pipeConfig.width) {
            if (bird.y - birdRadius < pipe.y || bird.y + birdRadius > pipe.y + pipeConfig.gap) {
                return true; 
            }
        }
    }

    return false;
}


/**
 * The main game loop function.
 */
function gameLoop() {
    if (isPlaying) {
        updateBird();
        updatePipes();
        updateGround();

        if (checkCollision()) {
            endGame();
            return;
        }
        checkScore();
        
        draw();

        frameCount++;
    }
}

// Start the whole process when the window loads
window.onload = function() {
    initGame();
};


</script>
</body> </html>
